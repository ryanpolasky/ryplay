server {
    listen 80;
    root /usr/share/nginx/html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript application/manifest+json image/svg+xml;
    gzip_min_length 1000;

    # ── SEO / static root files ────────────────────────────────────────
    # Exact-match blocks short-circuit BEFORE the SPA fallback so these
    # paths can never be served as /index.html. If the file is missing,
    # return a real 404 (which Google handles correctly).
    location = /robots.txt {
        access_log off;
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }
    location = /sitemap.xml {
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }
    location = /site.webmanifest {
        types { } default_type application/manifest+json;
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }
    location = /og.webp {
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }
    location = /favicon.ico {
        access_log off;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }
    location = /favicon.png {
        access_log off;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }
    location = /favicon.svg {
        access_log off;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }
    location = /icons.svg {
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }
    location = /apple-touch-icon.png {
        access_log off;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    # ── Hashed asset bundles ────────────────────────────────────────────
    # Vite outputs index-<hash>.js / index-<hash>.css — safe to cache forever.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # ── SPA shell ───────────────────────────────────────────────────────
    # index.html is what the SPA hangs off of — never cache it stale, otherwise
    # SEO/structured-data updates take days to propagate to crawlers.
    location = /index.html {
        add_header Cache-Control "no-store, must-revalidate";
        expires 0;
    }

    # ── SPA fallback ────────────────────────────────────────────────────
    # Anything else (including dynamic /username paths) falls back to the SPA.
    location / {
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # ── Backend proxy ───────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://ryplay-backend:8788;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # No /api/ endpoint accepts large bodies — Spotify callback is a few KB.
        # Keep this small so /api/* can't be abused as an upload sink.
        client_max_body_size 1M;
    }
}