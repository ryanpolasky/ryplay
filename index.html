<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.png" />

    <!-- viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- primary SEO -->
    <title>ryplay — Your music, visualized</title>
    <meta
      name="description"
      content="A real-time music dashboard powered by Last.fm. Visualize your listening habits, track streaks, explore stats, and share your music taste."
    />
    <meta name="theme-color" content="#000000" />

    <!-- Open Graph (Discord, iMessage, LinkedIn, etc.) -->
    <meta property="og:title" content="ryplay — Your music, visualized" />
    <meta
      property="og:description"
      content="Live music stats, listening history, streaks, and shareable visuals powered by Last.fm."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ryplay.dev/" />
    <meta property="og:image" content="https://ryplay.dev/og.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ryplay — Your music, visualized" />
    <meta
      name="twitter:description"
      content="Visualize your music taste with real-time stats and shareable cards."
    />
    <meta name="twitter:image" content="https://ryplay.dev/og.png" />

    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&family=Sora:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
